# ============================================================================
# 2Africa AgriOS — frontend nginx config (Sprint 29).
#
# Responsibilities:
#   1. Serve the Vite-built SPA from /usr/share/nginx/html
#   2. Reverse-proxy /api/* to the backend service (set BACKEND_URL via env)
#   3. SPA fallback: any non-file path → index.html so the Vue router handles it
#   4. /healthz for container/k8s liveness
#
# Backend address is resolved by Docker/K8s DNS as "backend:8080".
# Override with the BACKEND_HOST / BACKEND_PORT envsubst pattern if needed.
# ============================================================================

upstream backend_upstream {
    # Resolved by Docker/K8s service DNS. In k8s use "backend.<namespace>.svc.cluster.local".
    server backend:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Generous body size for photo uploads / PDF downloads
    client_max_body_size 25M;

    # ----- Static SPA -----
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively, but never cache the entry HTML
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PWA manifest + service worker — short cache so updates roll out fast
    location ~* \.(webmanifest|json)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ----- Health check -----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ----- Backend API -----
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # PDFs / xlsx may take a moment to render
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ----- SPA fallback for vue-router history mode -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Security headers -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS is set by the upstream ingress (cert-manager / Cloudflare)

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
}
