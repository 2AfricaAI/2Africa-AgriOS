# =============================================================================
# DEVELOPMENT profile - default credentials for local docker-compose stack.
# These are NOT secrets. The dev MySQL / Redis are bound to localhost only and
# the same default values are baked into docker-compose.yml so the stack just
# works out of the box.
#
# DO NOT use this profile in production. Use application-prod.yml + env vars.
# =============================================================================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3006/toafrica_agrios?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DEV_DB_USER:alberts}
    password: ${DEV_DB_PASSWORD:alberts123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${DEV_REDIS_PASSWORD:redis123}
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  # Sprint 50e -- SMTP for the weekly CS digest. Defaults target Gmail's
  # submission port with STARTTLS; override host/port for other providers.
  # Set DIGEST_MAIL_USER / DIGEST_MAIL_PASSWORD (Gmail App Password) in
  # backend/.env to enable; leaving them blank keeps the digest scheduled
  # job alive but the send-now / scheduled trigger will log + skip.
  mail:
    host: ${DIGEST_MAIL_HOST:smtp.gmail.com}
    port: ${DIGEST_MAIL_PORT:587}
    username: ${DIGEST_MAIL_USER:}
    password: ${DIGEST_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

# Redisson — uses the same dev default credentials as above
redisson:
  address: redis://localhost:6379
  password: ${DEV_REDIS_PASSWORD:redis123}
  database: 0

# 开发期跨域全开
agrios:
  cors:
    allowed-origins: "*"

  # Sprint 50e -- weekly CS digest email
  digest:
    enabled: ${DIGEST_ENABLED:true}
    cron:     ${DIGEST_CRON:0 0 6 ? * MON}
    from:     ${DIGEST_FROM:cs-bot@example.com}
    recipients: ${DIGEST_RECIPIENTS:}
    cc:         ${DIGEST_CC:}
    window-days: ${DIGEST_WINDOWDAYS:7}
    subject-prefix: ${DIGEST_SUBJECT_PREFIX:[2Africa CS Weekly]}
    locale: ${DIGEST_LOCALE:en}
