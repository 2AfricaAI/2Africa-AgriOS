spring:
  profiles:
    active: dev
  application:
    name: alberts-farm-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,text/css,text/javascript

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.albertsfarm.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: 'NULL'

# 业务配置
albertsfarm:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_at_least_64_chars_long_for_HS512_to_be_safe_xx}
    access-token-ttl-minutes: 120
    refresh-token-ttl-days: 7
    issuer: alberts-farm
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  upload:
    type: minio   # oss | minio | local
    max-size-mb: 10
    presigned-url-expire-minutes: 60
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
      - application/pdf
      - text/csv
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
  oss:
    # 后端到 MinIO/OSS 的内部地址 (容器网络)
    endpoint: ${OSS_ENDPOINT:}
    # 浏览器访问 MinIO/OSS 的公开地址 - 用于生成预签名 URL
    # 生产 OSS 上,内部和公开通常是同一个,可以不设这一项,自动回落到 endpoint
    public-endpoint: ${OSS_PUBLIC_ENDPOINT:}
    access-key: ${OSS_AK:}
    secret-key: ${OSS_SK:}
    bucket: ${OSS_BUCKET:alberts-farm}

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true

# 日志
logging:
  level:
    root: INFO
    com.albertsfarm: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/alberts-farm.log
    max-size: 100MB
    max-history: 30
