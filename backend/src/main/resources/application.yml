spring:
  profiles:
    active: dev
  application:
    name: agrios-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,text/css,text/javascript

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: ai.toafrica.agrios.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: 'NULL'

# Actuator — exposed under /api/actuator (context-path inherited). Only health + info
# are public; everything else stays disabled.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never        # don't leak DB / disk paths to anonymous callers
      probes:
        enabled: true            # adds /actuator/health/liveness + /readiness
  info:
    env:
      enabled: true
    git:
      mode: simple
  health:
    redis:
      enabled: true
    db:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'
    profile: ${spring.profiles.active}

# 业务配置
agrios:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_at_least_64_chars_long_for_HS512_to_be_safe_xx}
    access-token-ttl-minutes: 120
    refresh-token-ttl-days: 7
    issuer: 2africa-agrios
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  upload:
    type: minio   # oss | minio | local
    max-size-mb: 10
    presigned-url-expire-minutes: 60
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
      - application/pdf
      - text/csv
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
  oss:
    # 后端到 MinIO/OSS 的内部地址 (容器网络)
    endpoint: ${OSS_ENDPOINT:}
    # 浏览器访问 MinIO/OSS 的公开地址 - 用于生成预签名 URL
    # 生产 OSS 上,内部和公开通常是同一个,可以不设这一项,自动回落到 endpoint
    public-endpoint: ${OSS_PUBLIC_ENDPOINT:}
    access-key: ${OSS_AK:}
    secret-key: ${OSS_SK:}
    bucket: ${OSS_BUCKET:2africa-agrios}
  # Sprint 40: AgriOS <-> Chatwoot bridge for the Service module.
  # Leave api-token blank to disable the integration entirely (AgriOS keeps running).
  chatwoot:
    base-url: ${CHATWOOT_BASE_URL:http://chatwoot-web:3000}
    api-token: ${CHATWOOT_API_TOKEN:}
    account-id: ${CHATWOOT_ACCOUNT_ID:1}
    timeout-ms: 10000
    # Sprint 40d: shared secret for inbound webhook HMAC verification.
    # Leave blank for dev. In production, generate with: openssl rand -hex 32
    # then paste into Chatwoot Settings -> Integrations -> Webhooks -> HMAC.
    webhook-secret: ${CHATWOOT_WEBHOOK_SECRET:}
    # Sprint 40f: AI Agent. Provider-pluggable — set provider=claude|openai.
    # Disabled by default — set AI_AGENT_ENABLED=true and the matching
    # api key (ANTHROPIC_API_KEY for claude, OPENAI_API_KEY for openai).
    ai-agent:
      enabled: ${AI_AGENT_ENABLED:false}
      provider: ${AI_AGENT_PROVIDER:claude}
      # Claude (Anthropic)
      anthropic-api-key: ${ANTHROPIC_API_KEY:}
      # OpenAI / Azure / OpenAI-compatible gateway
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: ${OPENAI_BASE_URL:}
      openai-organization: ${OPENAI_ORGANIZATION:}
      # Shared
      model: ${AI_AGENT_MODEL:claude-haiku-4-5}
      max-tokens: ${AI_AGENT_MAX_TOKENS:400}
      temperature: ${AI_AGENT_TEMPERATURE:0.4}
      reply-public: ${AI_AGENT_REPLY_PUBLIC:false}
  # Sprint 43: Africa's Talking SMS gateway (Kenya-friendly cheap SMS).
  # Defaults to sandbox so devs can experiment without burning real
  # shillings. Set sandbox=false + a real API key + a registered sender id
  # to go live.
  africastalking:
    username: ${AFRICASTALKING_USERNAME:sandbox}
    api-key: ${AFRICASTALKING_API_KEY:}
    sender-id: ${AFRICASTALKING_SENDER_ID:}
    sandbox: ${AFRICASTALKING_SANDBOX:true}
    sms-inbox-id: ${AFRICASTALKING_SMS_INBOX_ID:}

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true

# 日志
logging:
  level:
    root: INFO
    ai.toafrica.agrios: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/2africa-agrios.log
    max-size: 100MB
    max-history: 30
