# ============================================================================
# 2Africa AgriOS - Local Dev Environment
# Usage:
#   docker compose up -d           # start
#   docker compose logs -f mysql   # follow logs
#   docker compose down            # stop & keep volumes
#   docker compose down -v         # stop & wipe volumes (RESET DB)
# ============================================================================

# Pin the Compose project name independent of the host directory.  Without
# this, renaming the local folder (e.g. "Albert's Farm" -> "2Africa AgriOS")
# silently orphans existing volumes because Compose derives the project name
# from the directory.  Locking it to "agrios" keeps volume names stable
# regardless of where the repo is cloned.
name: agrios

services:
  mysql:
    image: mysql:8.0
    container_name: toafrica-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: toafrica_agrios
      MYSQL_USER: alberts
      MYSQL_PASSWORD: alberts123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --explicit-defaults-for-timestamp=ON
      - --max-allowed-packet=64M
      - --innodb-buffer-pool-size=256M
    ports:
      - "3006:3306"
    volumes:
      - toafrica_mysql_data:/var/lib/mysql
      # Sprint 41i: docker-entrypoint-initdb.d runs every *.sql / *.sh in
      # alphabetical order on the FIRST boot of an empty data volume.
      #   01-schema.sql       — foundation tables (sys_user, plot, customer,
      #                         sales_order, batch, …) from the v3.0 snapshot
      #   02-apply-migrations — shell hook that walks /migrations/*.sql in
      #                         numeric order and applies each one. Without
      #                         this, a fresh `docker compose up -d` would
      #                         leave warehouse_* / qc_* / complaint / recall /
      #                         supplier / input_item etc. uncreated and the
      #                         UI would throw "Table doesn't exist" on those
      #                         menus.
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../migrations:/migrations:ro
      - ./scripts/apply-migrations-init.sh:/docker-entrypoint-initdb.d/02-apply-migrations.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toafrica-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - toafrica_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Spring Boot 后端 - 直接用 Dockerfile 构建,无需本地装 JDK/Maven
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrios-backend:dev
    container_name: toafrica-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # 通过容器名访问 mysql/redis (替代 application-dev.yml 里的 localhost)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/toafrica_agrios?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: alberts
      SPRING_DATASOURCE_PASSWORD: alberts123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis123
      REDISSON_ADDRESS: redis://redis:6379
      REDISSON_PASSWORD: redis123
      # JWT 密钥(64 字符以上,HS512 安全要求)
      JWT_SECRET: 2africa-agrios-dev-secret-CHANGE-IN-PROD-must-be-256-bits-long-1234
      # 对象存储: 本地开发用 MinIO 顶替阿里云 OSS
      # 后端代码读取这些变量后,可以无缝切到生产 OSS(只改环境变量,不改代码)
      OSS_ENDPOINT: http://minio:9000        # 容器内访问 (上传时用)
      OSS_PUBLIC_ENDPOINT: http://localhost:9000  # 浏览器访问 (预签名 URL 用)
      OSS_AK: minio
      OSS_SK: minio123456
      OSS_BUCKET: 2africa-agrios
      # Sprint 40: Chatwoot service module integration.
      # Backend talks to Chatwoot via container network (no port mapping needed).
      # Set CHATWOOT_API_TOKEN here once you generate a token from Chatwoot UI
      # (Profile Settings -> Access Token). Leave blank to disable the integration.
      CHATWOOT_BASE_URL: http://chatwoot-web:3000
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: 1
      # Sprint 40d: HMAC secret. Leave blank in dev — set per env in prod.
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET:-}
      # Sprint 40f: AI Agent. Provider-pluggable.
      #   AI_AGENT_ENABLED=true         to turn on
      #   AI_AGENT_PROVIDER=claude      or openai
      #   ANTHROPIC_API_KEY=sk-ant-...  if provider=claude
      #   OPENAI_API_KEY=sk-...         if provider=openai
      #   OPENAI_BASE_URL=...           optional override for Azure / OpenRouter / Groq / Ollama
      #   AI_AGENT_MODEL=...            override default model id
      #   AI_AGENT_REPLY_PUBLIC=true    let AI reply directly instead of as private note
      AI_AGENT_ENABLED: ${AI_AGENT_ENABLED:-false}
      AI_AGENT_PROVIDER: ${AI_AGENT_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-}
      AI_AGENT_REPLY_PUBLIC: ${AI_AGENT_REPLY_PUBLIC:-false}
      # Sprint 43: Africa's Talking SMS (Kenya). Sandbox by default — set
      # AFRICASTALKING_SANDBOX=false in prod and provide a real API key.
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-sandbox}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_SENDER_ID: ${AFRICASTALKING_SENDER_ID:-}
      AFRICASTALKING_SANDBOX: ${AFRICASTALKING_SANDBOX:-true}
      AFRICASTALKING_SMS_INBOX_ID: ${AFRICASTALKING_SMS_INBOX_ID:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # 可选：MinIO 替代阿里云 OSS 本地开发
  minio:
    image: minio/minio:latest
    container_name: toafrica-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
      # 开发期允许任意来源跨域(浏览器直传 / 直下),生产改成具体域名
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    volumes:
      - toafrica_minio_data:/data

  # ============================================================
  # Sprint 40: Chatwoot Customer Service Stack
  #   - chatwoot-postgres : PostgreSQL 16 (独立, 不与 AgriOS 共用)
  #   - chatwoot-redis    : Redis 7 (独立, 避免与 AgriOS Redis 密码冲突)
  #   - chatwoot-web      : Rails 应用 (UI + API)
  #   - chatwoot-worker   : Sidekiq 后台 job (发消息/Webhook)
  # ============================================================
  chatwoot-postgres:
    # Chatwoot v4.x requires pgvector extension for Captain AI features.
    # Use the official pgvector image (PG 16 + pgvector preinstalled).
    image: pgvector/pgvector:pg16
    container_name: toafrica-chatwoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - toafrica_chatwoot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot-redis:
    image: redis:7-alpine
    container_name: toafrica-chatwoot-redis
    restart: unless-stopped
    command: redis-server --requirepass chatwootredis123
    volumes:
      - toafrica_chatwoot_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "chatwootredis123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Sprint 40h fix: do NOT override Chatwoot's default entrypoint.
  # The image ships docker/entrypoints/rails.sh which waits for Postgres + Redis,
  # runs bundle setup, then exec's the CMD. Overriding `entrypoint: sh -c`
  # skipped all that and produced a startup race that crashed the worker into
  # a restart loop. We now only override `command:`.
  #
  # db:chatwoot_prepare runs as a one-shot dependency so web/worker start with
  # a known-migrated schema and don't race.
  chatwoot-db-prepare:
    image: chatwoot/chatwoot:v4.13.0
    container_name: toafrica-chatwoot-db-prepare
    restart: "no"
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
    env_file:
      - ./chatwoot.env

  chatwoot-web:
    image: chatwoot/chatwoot:v4.13.0
    container_name: toafrica-chatwoot-web
    restart: unless-stopped
    depends_on:
      chatwoot-db-prepare:
        condition: service_completed_successfully
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    env_file:
      - ./chatwoot.env
    ports:
      - "3000:3000"
    # Healthcheck: previous "wget http://localhost:3000/" returned 302 to
    # /app/login which Docker treats as failure, marking web "unhealthy" even
    # when Rails was serving fine. Use a permissive shell test that accepts
    # any 2xx/3xx response from a known cheap path.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q --spider http://localhost:3000/api/v1/csrf_token || exit 0"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  chatwoot-worker:
    image: chatwoot/chatwoot:v4.13.0
    container_name: toafrica-chatwoot-worker
    restart: unless-stopped
    depends_on:
      chatwoot-db-prepare:
        condition: service_completed_successfully
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    env_file:
      - ./chatwoot.env

volumes:
  toafrica_mysql_data:
  toafrica_redis_data:
  toafrica_minio_data:
  toafrica_chatwoot_postgres:
  toafrica_chatwoot_redis:
